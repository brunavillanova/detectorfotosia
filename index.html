<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Detector de Imagem IA</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
width:400px;
}

h1{
margin-bottom:20px;
color:#333;
}

input[type=file]{
margin:20px 0;
}

button{
background:#667eea;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#5a67d8;
transform:scale(1.05);
}

.resultado{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.preview{
margin-top:20px;
}

img{
max-width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 Detector de Imagem IA</h1>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="imagem" accept="image/*" onchange="previewImagem(event)" required>

<br>

<button type="submit">Analisar Imagem</button>

</form>

<div class="preview">
<img id="preview">
</div>

<div class="resultado" id="resultado">
{% if resultado %}
{{ resultado }}
{% endif %}
</div>

</div>

<script>

function previewImagem(event){

const reader = new FileReader()

reader.onload = function(){
const output = document.getElementById('preview')
output.src = reader.result
}

reader.readAsDataURL(event.target.files[0])

// remove resultado antigo
document.getElementById("resultado").innerHTML = ""

}

</script>

</body>
</html>
